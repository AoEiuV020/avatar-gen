<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 16px; }
    h2 { font-size: 16px; color: #555; margin: 24px 0 16px; }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }
    .card h3 {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
      font-weight: normal;
    }
    img { display: block; border: 1px solid #eee; image-rendering: pixelated; }
  </style>
</head>
<body>
  <h1>Avatar Preview</h1>
  <h2>动态头像 (animated WebP)</h2>
  <div class="grid">
    <div class="card">
      <h3>64px</h3>
      <img src="avatar.webp" width="64" height="64" alt="64px">
    </div>
    <div class="card">
      <h3>128px</h3>
      <img src="avatar.webp" width="128" height="128" alt="128px">
    </div>
    <div class="card">
      <h3>200px</h3>
      <img src="avatar.webp" width="200" height="200" alt="200px">
    </div>
    <div class="card">
      <h3>300px</h3>
      <img src="avatar.webp" width="300" height="300" alt="300px">
    </div>
    <div class="card">
      <h3>450px</h3>
      <img src="avatar.webp" width="450" height="450" alt="450px">
    </div>
  </div>

  <h2>静态头像 (PNG)</h2>
  <div class="grid">
    <div class="card">
      <h3>64px</h3>
      <img src="avatar.png" width="64" height="64" alt="64px">
    </div>
    <div class="card">
      <h3>128px</h3>
      <img src="avatar.png" width="128" height="128" alt="128px">
    </div>
    <div class="card">
      <h3>200px</h3>
      <img src="avatar.png" width="200" height="200" alt="200px">
    </div>
    <div class="card">
      <h3>300px</h3>
      <img src="avatar.png" width="300" height="300" alt="300px">
    </div>
    <div class="card">
      <h3>450px</h3>
      <img src="avatar.png" width="450" height="450" alt="450px">
    </div>
  </div>
</body>
</html>
