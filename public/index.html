<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar Preview</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f0f0f0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 24px;
      min-height: 100vh;
    }
    h1 { font-size: 20px; color: #333; margin-bottom: 16px; }
    h2 { font-size: 16px; color: #555; margin: 24px 0 12px; }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-end;
    }
    .card {
      background: white;
      border-radius: 8px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      text-align: center;
    }
    .card h3 {
      font-size: 13px;
      color: #999;
      margin-bottom: 8px;
      font-weight: normal;
    }
    img { display: block; border: 1px solid #eee; image-rendering: pixelated; }
    .circle img { border-radius: 50%; }
    .checkerboard {
      background-image:
        linear-gradient(45deg, #ccc 25%, transparent 25%),
        linear-gradient(-45deg, #ccc 25%, transparent 25%),
        linear-gradient(45deg, transparent 75%, #ccc 75%),
        linear-gradient(-45deg, transparent 75%, #ccc 75%);
      background-size: 16px 16px;
      background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    }
    .dark-bg { background: #333; }
    .dark-bg img { border-color: #555; }
  </style>
</head>
<body>
  <h1>Avatar Preview</h1>

  <h2>动画 WebP</h2>
  <div class="grid">
    <div class="card"><h3>64px</h3><img src="avatar.webp" width="64" height="64"></div>
    <div class="card"><h3>200px</h3><img src="avatar.webp" width="200" height="200"></div>
    <div class="card"><h3>450px</h3><img src="avatar.webp" width="450" height="450"></div>
    <div class="card circle"><h3>200px 圆形裁剪</h3><img src="avatar.webp" width="200" height="200"></div>
  </div>

  <h2>方形</h2>
  <div class="grid">
    <div class="card"><h3>GIF</h3><img src="avatar.gif" width="200" height="200"></div>
    <div class="card"><h3>JPG</h3><img src="avatar.jpg" width="200" height="200"></div>
    <div class="card"><h3>静态 WebP</h3><img src="avatar-static.webp" width="200" height="200"></div>
    <div class="card checkerboard"><h3>PNG 黑字</h3><img src="avatar-black.png" width="200" height="200"></div>
    <div class="card dark-bg"><h3 style="color:#777">PNG 白字</h3><img src="avatar-white.png" width="200" height="200"></div>
  </div>

  <h2>圆形变体</h2>
  <div class="grid">
    <div class="card circle"><h3>动画 WebP</h3><img src="avatar-circle.webp" width="200" height="200"></div>
    <div class="card circle"><h3>GIF</h3><img src="avatar-circle.gif" width="200" height="200"></div>
    <div class="card circle"><h3>JPG</h3><img src="avatar-circle.jpg" width="200" height="200"></div>
    <div class="card circle"><h3>静态 WebP</h3><img src="avatar-circle-static.webp" width="200" height="200"></div>
    <div class="card circle checkerboard"><h3>PNG 黑字</h3><img src="avatar-circle-black.png" width="200" height="200"></div>
    <div class="card circle dark-bg"><h3 style="color:#777">PNG 白字</h3><img src="avatar-circle-white.png" width="200" height="200"></div>
  </div>
</body>
</html>
